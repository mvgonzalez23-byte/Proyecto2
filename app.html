<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deezer-Manager</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="offline-banner">📡 Sin conexión — mostrando datos guardados localmente</div>
<div class="offline-banner" data-sync-toast style="display:none; background:var(--ok); color:#fff;"></div>

<div class="screen">
  <header class="topbar">
    <div class="container topbar-inner">
      <span class="brand"><span class="disc" aria-hidden="true"></span> Deezer-Manager</span>
      <nav class="nav-tabs">
        <a class="nav-tab" data-route="search" href="#/search">Buscar</a>
        <a class="nav-tab" data-route="favorites" href="#/favorites">Mis álbumes</a>
      </nav>
      <div class="topbar-actions">
        <span class="fav-count" id="current-user" style="margin-right:6px;"></span>
        <button class="icon-btn" data-theme-toggle aria-label="Cambiar tema">🌙</button>
        <button class="icon-btn" id="logout-btn" aria-label="Cerrar sesión" title="Cerrar sesión">➔</button>
      </div>
    </div>
  </header>

  <main class="container" id="view-root"></main>
</div>

<script src="js/storage.js"></script>
<script src="js/theme.js"></script>
<script src="js/auth.js"></script>
<script src="js/offline.js"></script>
<script src="js/api.js"></script>
<script src="js/search.js"></script>
<script src="js/artist.js"></script>
<script src="js/favorites.js"></script>
<script src="js/app.js"></script>
</body>
</html>
